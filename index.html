<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#eee8d6" />
  <title>타동숲 컬렉션</title>

  <style>
    :root {
      --bg: #eee8d6;
      --surface: #fffdf7;
      --surface-2: #f7f3e8;
      --text: #35332d;
      --muted: #7d786b;
      --line: #ddd5c2;
      --green: #4f9660;
      --green-dark: #357346;
      --green-soft: #d5ecd6;
      --yellow: #f2ca66;
      --red-soft: #f4d8d2;
      --shadow: 0 7px 22px rgba(61, 54, 41, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 0%, rgba(255,255,255,.72), transparent 28%),
        var(--bg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app {
      width: 100%;
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: calc(42px + env(safe-area-inset-bottom));
    }

    .hero {
      padding:
        calc(21px + env(safe-area-inset-top))
        14px
        13px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .1em;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.2;
      letter-spacing: -.045em;
    }

    .hero p:last-child {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .progress-panel {
      margin: 0 10px 11px;
      padding: 13px;
      border: 1px solid rgba(221,213,194,.9);
      border-radius: 17px;
      background: rgba(255,253,247,.95);
      box-shadow: var(--shadow);
    }

    .progress-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .progress-title {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
    }

    .progress-count {
      margin-top: 3px;
      font-size: 21px;
      font-weight: 950;
      letter-spacing: -.04em;
    }

    .progress-percent {
      color: var(--green-dark);
      font-size: 19px;
      font-weight: 950;
    }

    .progress-track {
      height: 10px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6dfcf;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width 180ms ease;
    }

    .sticky-area {
      position: sticky;
      top: 0;
      z-index: 40;
      padding:
        calc(7px + env(safe-area-inset-top))
        8px
        8px;
      border-bottom: 1px solid rgba(221,213,194,.9);
      background: rgba(238,232,214,.93);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 86px 80px;
      gap: 5px;
    }

    .search-wrap {
      position: relative;
      min-width: 0;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 13px;
    }

    .search-input,
    .filter-select,
    .edit-button {
      width: 100%;
      height: 41px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,253,247,.98);
    }

    .search-input {
      min-width: 0;
      padding: 0 9px 0 31px;
      outline: none;
      font-size: 12px;
    }

    .search-input:focus,
    .filter-select:focus {
      border-color: var(--green);
      outline: 3px solid rgba(79,150,96,.14);
    }

    .filter-select {
      padding: 0 5px;
      outline: none;
      font-size: 11px;
      font-weight: 800;
    }

    .edit-button {
      border-color: var(--green);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
    }

    .edit-button.active {
      color: white;
      border-color: var(--green-dark);
      background: var(--green-dark);
    }

    .secondary-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 5px;
      margin-top: 5px;
    }

    .sort-select,
    .source-select {
      width: 100%;
      height: 36px;
      min-width: 0;
      padding: 0 7px;
      border: 1px solid var(--line);
      border-radius: 11px;
      color: var(--text);
      background: rgba(255,253,247,.98);
      outline: none;
      font-size: 11px;
      font-weight: 750;
    }

    .edit-guide {
      display: none;
      margin-top: 6px;
      padding: 7px 9px;
      border-radius: 9px;
      color: #315d3b;
      background: var(--green-soft);
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }

    .edit-guide.visible {
      display: block;
    }

    .result-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 10px 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .reset-button {
      flex: none;
      padding: 5px 7px;
      border: 0;
      color: var(--green-dark);
      background: transparent;
      font-size: 11px;
      font-weight: 850;
      cursor: pointer;
    }

    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
      padding: 0 6px 22px;
    }

    .item-card {
      position: relative;
      min-width: 0;
      overflow: hidden;
      padding: 4px 3px 6px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--surface);
      box-shadow: 0 2px 6px rgba(60,53,39,.07);
      cursor: pointer;
      transition:
        transform 90ms ease,
        background 130ms ease,
        border-color 130ms ease;
    }

    .item-card:active {
      transform: scale(.96);
    }

    .item-card.owned {
      border-color: #68ae73;
      background: var(--green-soft);
    }

    .item-image {
      position: relative;
      display: grid;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      place-items: center;
      border-radius: 8px;
      background:
        radial-gradient(circle at 35% 27%, #fff, #ece5d4);
    }

    .item-card.owned .item-image {
      background:
        radial-gradient(circle at 35% 27%, #fbfffb, #c7e4c9);
    }

    .item-photo {
      display: block;
      width: 100%;
      height: 100%;
      padding: 3px;
      object-fit: contain;
    }

    .item-fallback {
      display: none;
      width: 100%;
      height: 100%;
      place-items: center;
      color: var(--muted);
      font-size: 25px;
    }

    .item-fallback.visible {
      display: grid;
    }

    .item-name {
      display: -webkit-box;
      min-height: 26px;
      margin-top: 4px;
      overflow: hidden;
      font-size: 9.5px;
      font-weight: 850;
      line-height: 13px;
      text-align: center;
      word-break: keep-all;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .check-mark {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 3;
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      background: var(--green-dark);
      box-shadow: 0 2px 5px rgba(0,0,0,.18);
      place-items: center;
      font-size: 11px;
      font-weight: 950;
    }

    .item-card.owned .check-mark {
      display: grid;
    }

    .badge {
      position: absolute;
      top: 4px;
      left: 4px;
      z-index: 3;
      padding: 2px 4px;
      border-radius: 6px;
      color: #564100;
      background: var(--yellow);
      font-size: 7px;
      font-weight: 950;
    }

    .empty-state,
    .loading-state,
    .error-state {
      display: none;
      padding: 44px 18px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state.visible,
    .loading-state.visible,
    .error-state.visible {
      display: block;
    }

    .error-state {
      color: #8a4036;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding-top: 35px;
      background: rgba(36,34,29,.48);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .overlay.visible {
      display: flex;
    }

    .detail-sheet {
      width: 100%;
      max-width: 760px;
      max-height: 91vh;
      overflow-y: auto;
      padding:
        9px
        14px
        calc(20px + env(safe-area-inset-bottom));
      border-radius: 24px 24px 0 0;
      background: white;
      box-shadow: 0 -12px 34px rgba(0,0,0,.2);
      animation: sheet-up 170ms ease-out;
    }

    @keyframes sheet-up {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-handle {
      width: 42px;
      height: 5px;
      margin: 0 auto 7px;
      border-radius: 999px;
      background: #d3cfc5;
    }

    .detail-close-row {
      display: flex;
      justify-content: flex-end;
    }

    .close-button {
      width: 35px;
      height: 35px;
      border: 0;
      border-radius: 50%;
      background: #efede7;
      font-size: 18px;
      font-weight: 850;
      cursor: pointer;
    }

    .detail-image {
      display: grid;
      width: 155px;
      aspect-ratio: 1 / 1;
      margin: -2px auto 0;
      overflow: hidden;
      place-items: center;
      border-radius: 22px;
      background:
        radial-gradient(circle at 35% 27%, #fff, #ece5d4);
    }

    .detail-image img {
      display: block;
      width: 100%;
      height: 100%;
      padding: 10px;
      object-fit: contain;
    }

    .detail-fallback {
      display: none;
      width: 100%;
      height: 100%;
      place-items: center;
      color: var(--muted);
      font-size: 58px;
    }

    .detail-fallback.visible {
      display: grid;
    }

    .detail-name {
      margin: 12px 0 2px;
      font-size: 22px;
      font-weight: 950;
      text-align: center;
      letter-spacing: -.045em;
    }

    .detail-subname {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .detail-japanese {
      margin: 3px 0 15px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    .detail-table {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 15px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 105px minmax(0, 1fr);
      min-height: 42px;
      border-bottom: 1px solid #eae5d9;
    }

    .detail-row:last-child {
      border-bottom: 0;
    }

    .detail-label,
    .detail-value {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      font-size: 12px;
    }

    .detail-label {
      color: var(--muted);
      background: var(--surface-2);
      font-weight: 750;
    }

    .detail-value {
      overflow-wrap: anywhere;
      font-weight: 750;
    }

    .detail-owned-button {
      width: 100%;
      height: 48px;
      margin-top: 12px;
      border: 1px solid var(--green);
      border-radius: 14px;
      color: var(--green-dark);
      background: white;
      font-weight: 950;
      cursor: pointer;
    }

    .detail-owned-button.active {
      color: white;
      background: var(--green-dark);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 130;
      pointer-events: none;
      transform: translate(-50%, 12px);
      opacity: 0;
      padding: 9px 13px;
      border-radius: 999px;
      color: white;
      background: rgba(47,45,39,.94);
      font-size: 11px;
      font-weight: 800;
      transition:
        opacity 130ms ease,
        transform 130ms ease;
    }

    .toast.visible {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    @media (min-width: 600px) {
      .item-grid {
        gap: 8px;
        padding-right: 10px;
        padding-left: 10px;
      }

      .item-card {
        padding: 7px;
      }

      .item-name {
        font-size: 12px;
        line-height: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">CITY FOLK COLLECTION</p>
      <h1>타동숲 컬렉션</h1>
      <p>타운으로 놀러가요 동물의 숲 모든 가구 수집 기록</p>
    </header>

    <section class="progress-panel">
      <div class="progress-top">
        <div>
          <p class="progress-title">가구 수집 진행률</p>
          <div class="progress-count">
            <span id="ownedCount">0</span>
            <span>/</span>
            <span id="totalCount">0</span>
          </div>
        </div>
        <div id="progressPercent" class="progress-percent">0%</div>
      </div>

      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section class="sticky-area">
      <div class="toolbar">
        <label class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="한글·영어·일본어 검색"
            autocomplete="off"
          />
        </label>

        <select id="filterSelect" class="filter-select" aria-label="보유 필터">
          <option value="all">전체</option>
          <option value="owned">보유</option>
          <option value="unowned">미보유</option>
          <option value="orderable">주문 가능</option>
          <option value="not-orderable">주문 불가</option>
          <option value="dlc">DLC</option>
        </select>

        <button id="editButton" class="edit-button" type="button">
          편집
        </button>
      </div>

      <div class="secondary-toolbar">
        <select id="sourceSelect" class="source-select" aria-label="입수처 필터">
          <option value="all">모든 입수처</option>
        </select>

        <select id="sortSelect" class="sort-select" aria-label="정렬">
          <option value="number">도감 순서</option>
          <option value="ko">한글 이름순</option>
          <option value="price-low">가격 낮은순</option>
          <option value="price-high">가격 높은순</option>
          <option value="unowned-first">미보유 우선</option>
        </select>
      </div>

      <div id="editGuide" class="edit-guide">
        편집 중 · 가구를 눌러 보유 여부를 변경하세요
      </div>
    </section>

    <div class="result-info">
      <span id="resultCount">데이터 불러오는 중</span>
      <button id="resetButton" class="reset-button" type="button">
        검색·필터 초기화
      </button>
    </div>

    <div id="loadingState" class="loading-state visible">
      가구 데이터와 이미지를 준비하고 있습니다.
    </div>

    <div id="errorState" class="error-state">
      가구 DB를 불러오지 못했습니다. data/furniture.js 파일 위치를 확인하세요.
    </div>

    <section id="itemGrid" class="item-grid"></section>

    <div id="emptyState" class="empty-state">
      조건에 맞는 가구가 없습니다.
    </div>
  </main>

  <div id="detailOverlay" class="overlay" aria-hidden="true">
    <section class="detail-sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>

      <div class="detail-close-row">
        <button
          id="closeDetailButton"
          class="close-button"
          type="button"
          aria-label="상세정보 닫기"
        >
          ×
        </button>
      </div>

      <div id="detailImage" class="detail-image"></div>

      <h2 id="detailName" class="detail-name"></h2>
      <p id="detailEnglishName" class="detail-subname"></p>
      <p id="detailJapaneseName" class="detail-japanese"></p>

      <div id="detailTable" class="detail-table"></div>

      <button
        id="detailOwnedButton"
        class="detail-owned-button"
        type="button"
      >
        보유로 체크
      </button>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 숫자를 올리면 브라우저 캐시를 강제로 갱신할 수 있습니다. -->
  <script src="./data/furniture.js?v=2"></script>

  <script>
    const items = Array.isArray(window.CITY_FOLK_DB?.furniture)
      ? window.CITY_FOLK_DB.furniture
      : [];

    const storageKey = "city-folk-owned-items-v3";

    let ownedIds = new Set(loadOwnedIds());
    let editMode = false;
    let selectedItem = null;
    let toastTimer = null;

    const itemGrid = document.getElementById("itemGrid");
    const searchInput = document.getElementById("searchInput");
    const filterSelect = document.getElementById("filterSelect");
    const sourceSelect = document.getElementById("sourceSelect");
    const sortSelect = document.getElementById("sortSelect");
    const editButton = document.getElementById("editButton");
    const editGuide = document.getElementById("editGuide");
    const resetButton = document.getElementById("resetButton");
    const resultCount = document.getElementById("resultCount");
    const loadingState = document.getElementById("loadingState");
    const errorState = document.getElementById("errorState");
    const emptyState = document.getElementById("emptyState");

    const ownedCount = document.getElementById("ownedCount");
    const totalCount = document.getElementById("totalCount");
    const progressPercent = document.getElementById("progressPercent");
    const progressBar = document.getElementById("progressBar");

    const detailOverlay = document.getElementById("detailOverlay");
    const closeDetailButton = document.getElementById("closeDetailButton");
    const detailImage = document.getElementById("detailImage");
    const detailName = document.getElementById("detailName");
    const detailEnglishName = document.getElementById("detailEnglishName");
    const detailJapaneseName = document.getElementById("detailJapaneseName");
    const detailTable = document.getElementById("detailTable");
    const detailOwnedButton = document.getElementById("detailOwnedButton");
    const toast = document.getElementById("toast");

    function loadOwnedIds() {
      try {
        const saved = localStorage.getItem(storageKey);
        if (!saved) return [];

        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveOwnedIds() {
      localStorage.setItem(storageKey, JSON.stringify([...ownedIds]));
    }

    function safeText(value, fallback = "정보 없음") {
      if (
        value === null ||
        value === undefined ||
        value === "" ||
        value === "-"
      ) {
        return fallback;
      }
      return String(value);
    }

    function formatBells(price) {
      if (
        price === null ||
        price === undefined ||
        price === "" ||
        price === "-"
      ) {
        return "구입 불가";
      }

      if (typeof price === "number") {
        return `${price.toLocaleString("ko-KR")}벨`;
      }

      return String(price);
    }

    function formatYesNo(value) {
      if (value === true) return "가능";
      if (value === false) return "불가능";
      return safeText(value);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isDlc(item) {
      return item.dlc === true;
    }

    function populateSourceFilter() {
      const sources = [...new Set(
        items
          .map((item) => safeText(item.source, ""))
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, "en"));

      sources.forEach((source) => {
        const option = document.createElement("option");
        option.value = source;
        option.textContent = source;
        sourceSelect.appendChild(option);
      });
    }

    function matchesSearch(item, keyword) {
      const text = [
        item.nameKo,
        item.nameEn,
        item.nameEnEu,
        item.nameJa,
        item.collection,
        item.source,
        item.type
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();

      return text.includes(keyword);
    }

    function getFilteredItems() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filter = filterSelect.value;
      const selectedSource = sourceSelect.value;

      let result = items.filter((item) => {
        if (keyword && !matchesSearch(item, keyword)) {
          return false;
        }

        if (selectedSource !== "all" && item.source !== selectedSource) {
          return false;
        }

        if (filter === "owned" && !ownedIds.has(item.id)) {
          return false;
        }

        if (filter === "unowned" && ownedIds.has(item.id)) {
          return false;
        }

        if (filter === "orderable" && item.reorderable !== true) {
          return false;
        }

        if (filter === "not-orderable" && item.reorderable !== false) {
          return false;
        }

        if (filter === "dlc" && !isDlc(item)) {
          return false;
        }

        return true;
      });

      const sort = sortSelect.value;

      result.sort((a, b) => {
        if (sort === "ko") {
          return safeText(a.nameKo).localeCompare(
            safeText(b.nameKo),
            "ko"
          );
        }

        if (sort === "price-low") {
          return (a.buyPrice ?? Number.MAX_SAFE_INTEGER) -
            (b.buyPrice ?? Number.MAX_SAFE_INTEGER);
        }

        if (sort === "price-high") {
          return (b.buyPrice ?? -1) - (a.buyPrice ?? -1);
        }

        if (sort === "unowned-first") {
          const ownedDifference =
            Number(ownedIds.has(a.id)) - Number(ownedIds.has(b.id));

          if (ownedDifference !== 0) {
            return ownedDifference;
          }
        }

        return Number(a.number || 0) - Number(b.number || 0);
      });

      return result;
    }

    function createItemCard(item) {
      const button = document.createElement("button");
      const isOwned = ownedIds.has(item.id);

      button.type = "button";
      button.className = `item-card${isOwned ? " owned" : ""}`;
      button.setAttribute("aria-label", safeText(item.nameKo, item.nameEn));

      const imageHtml = item.image
        ? `
          <img
            class="item-photo"
            src="${escapeHtml(item.image)}"
            alt="${escapeHtml(safeText(item.nameKo, item.nameEn))}"
            loading="lazy"
          />
          <span class="item-fallback">📦</span>
        `
        : `<span class="item-fallback visible">📦</span>`;

      button.innerHTML = `
        ${isDlc(item) ? '<span class="badge">DLC</span>' : ""}
        <span class="check-mark">✓</span>

        <div class="item-image">
          ${imageHtml}
        </div>

        <div class="item-name">
          ${escapeHtml(safeText(item.nameKo, item.nameEn))}
        </div>
      `;

      const image = button.querySelector(".item-photo");
      if (image) {
        image.addEventListener("error", () => {
          image.style.display = "none";
          const fallback = button.querySelector(".item-fallback");
          if (fallback) fallback.classList.add("visible");
        });
      }

      button.addEventListener("click", () => {
        if (editMode) {
          toggleOwned(item);
          return;
        }

        openDetail(item);
      });

      return button;
    }

    function renderItems() {
      loadingState.classList.remove("visible");

      if (items.length === 0) {
        errorState.classList.add("visible");
        itemGrid.innerHTML = "";
        resultCount.textContent = "DB 연결 실패";
        updateProgress();
        return;
      }

      errorState.classList.remove("visible");

      const filteredItems = getFilteredItems();
      itemGrid.innerHTML = "";

      const fragment = document.createDocumentFragment();

      filteredItems.forEach((item) => {
        fragment.appendChild(createItemCard(item));
      });

      itemGrid.appendChild(fragment);

      resultCount.textContent =
        `전체 ${items.length.toLocaleString("ko-KR")}개 중 ` +
        `${filteredItems.length.toLocaleString("ko-KR")}개 표시`;

      emptyState.classList.toggle(
        "visible",
        filteredItems.length === 0
      );

      updateProgress();
    }

    function updateProgress() {
      const collected = items.reduce(
        (count, item) => count + Number(ownedIds.has(item.id)),
        0
      );

      const percent =
        items.length === 0
          ? 0
          : Math.round((collected / items.length) * 1000) / 10;

      ownedCount.textContent = collected.toLocaleString("ko-KR");
      totalCount.textContent = items.length.toLocaleString("ko-KR");
      progressPercent.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;
    }

    function toggleOwned(item) {
      const willOwn = !ownedIds.has(item.id);

      if (willOwn) {
        ownedIds.add(item.id);
      } else {
        ownedIds.delete(item.id);
      }

      saveOwnedIds();
      renderItems();

      if (selectedItem && selectedItem.id === item.id) {
        updateDetailOwnedButton();
      }

      showToast(
        willOwn
          ? `${safeText(item.nameKo, item.nameEn)} 보유 체크`
          : `${safeText(item.nameKo, item.nameEn)} 체크 해제`
      );
    }

    function setEditMode(enabled) {
      editMode = enabled;
      editButton.classList.toggle("active", editMode);
      editGuide.classList.toggle("visible", editMode);
      editButton.textContent = editMode ? "✓ 편집 중" : "편집";
    }

    function createDetailRow(label, value) {
      return `
        <div class="detail-row">
          <div class="detail-label">${escapeHtml(label)}</div>
          <div class="detail-value">${escapeHtml(safeText(value))}</div>
        </div>
      `;
    }

    function openDetail(item) {
      selectedItem = item;

      detailImage.innerHTML = item.image
        ? `
          <img
            id="detailPhoto"
            src="${escapeHtml(item.image)}"
            alt="${escapeHtml(safeText(item.nameKo, item.nameEn))}"
          />
          <span class="detail-fallback">📦</span>
        `
        : `<span class="detail-fallback visible">📦</span>`;

      const detailPhoto = document.getElementById("detailPhoto");
      if (detailPhoto) {
        detailPhoto.addEventListener("error", () => {
          detailPhoto.style.display = "none";
          const fallback = detailImage.querySelector(".detail-fallback");
          if (fallback) fallback.classList.add("visible");
        });
      }

      detailName.textContent = safeText(item.nameKo, item.nameEn);
      detailEnglishName.textContent = safeText(item.nameEn, "");
      detailJapaneseName.textContent = safeText(item.nameJa, "");

      const details = [
        ["도감 번호", item.number],
        ["구입 가격", formatBells(item.buyPrice)],
        ["포인트 가격", item.buyPricePoints == null
          ? "해당 없음"
          : `${Number(item.buyPricePoints).toLocaleString("ko-KR")}포인트`
        ],
        ["판매 가격", formatBells(item.sellPrice)],
        ["입수 방법", item.source],
        ["입수 분류", item.sourceGroup],
        ["카탈로그 주문", formatYesNo(item.reorderable)],
        ["크기", item.size],
        ["종류", item.type],
        ["상호작용", item.interactivity],
        ["색상 1", item.color1],
        ["색상 2", item.color2],
        ["분위기 1", item.genre1],
        ["분위기 2", item.genre2],
        ["HRA 기본 점수", item.hraBasePoints == null
          ? "정보 없음"
          : `${Number(item.hraBasePoints).toLocaleString("ko-KR")}점`
        ],
        ["가구 컬렉션", item.collection],
        ["컬렉션 종류", item.collectionType],
        ["DLC", item.dlc === true ? "예" : "아니요"],
        ["한국 배포 기간", item.dlcDates?.kor],
        ["비고", item.notes || item.sourceNotes]
      ];

      detailTable.innerHTML = details
        .map(([label, value]) => createDetailRow(label, value))
        .join("");

      updateDetailOwnedButton();

      detailOverlay.classList.add("visible");
      detailOverlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeDetail() {
      detailOverlay.classList.remove("visible");
      detailOverlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      selectedItem = null;
    }

    function updateDetailOwnedButton() {
      if (!selectedItem) return;

      const isOwned = ownedIds.has(selectedItem.id);
      detailOwnedButton.classList.toggle("active", isOwned);
      detailOwnedButton.textContent = isOwned
        ? "✓ 보유 중"
        : "보유로 체크";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("visible");

      clearTimeout(toastTimer);

      toastTimer = setTimeout(() => {
        toast.classList.remove("visible");
      }, 1200);
    }

    function resetFilters() {
      searchInput.value = "";
      filterSelect.value = "all";
      sourceSelect.value = "all";
      sortSelect.value = "number";
      renderItems();
    }

    searchInput.addEventListener("input", renderItems);
    filterSelect.addEventListener("change", renderItems);
    sourceSelect.addEventListener("change", renderItems);
    sortSelect.addEventListener("change", renderItems);

    editButton.addEventListener("click", () => {
      setEditMode(!editMode);
    });

    resetButton.addEventListener("click", resetFilters);
    closeDetailButton.addEventListener("click", closeDetail);

    detailOverlay.addEventListener("click", (event) => {
      if (event.target === detailOverlay) {
        closeDetail();
      }
    });

    detailOwnedButton.addEventListener("click", () => {
      if (selectedItem) {
        toggleOwned(selectedItem);
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDetail();
      }
    });

    populateSourceFilter();
    renderItems();
  </script>
</body>
</html>
